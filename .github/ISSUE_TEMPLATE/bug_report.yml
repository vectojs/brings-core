name: Bug report
description: Report a reproducible Brings Core behavior problem.
labels: [bug]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the document input, command sequence, and observed result.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
    validations:
      required: true
